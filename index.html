<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oasis Bridge V7.7 - LUM 标签进化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
        .app-screen { background: radial-gradient(circle at top right, #1f2937, #030712 80%); color: #f3f4f6; min-height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; overflow-y: auto; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .recording-active { animation: pulse-gold 1.2s infinite alternate; background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%) !important; }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); } 100% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } }
        .hidden-screen { display: none !important; }
        .lum-tag { background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.4); color: #60a5fa; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        input { background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.1); outline: none; }
    </style>
</head>
<body class="font-sans bg-slate-900">

    <div id="auth-screen" class="app-screen z-[60] flex flex-col p-8 justify-center">
        <div class="mb-10 text-center">
            <h1 class="text-5xl font-black text-amber-500 italic">Oasis Bridge</h1>
            <p class="text-amber-500/70 mt-3 text-[10px] font-bold tracking-[0.4em]">LUM ENGINE V7.7</p>
        </div>
        <div class="glass-panel p-8 rounded-[40px] max-w-md mx-auto w-full">
            <form onsubmit="event.preventDefault(); executeAuth();" class="space-y-4">
                <input id="email" type="email" placeholder="Email" class="w-full p-5 rounded-2xl">
                <input id="password" type="password" placeholder="Password" class="w-full p-5 rounded-2xl">
                <button type="submit" id="auth-action-btn" class="w-full py-5 rounded-2xl bg-amber-600 text-white font-black">进入系统</button>
                <p id="auth-msg" class="text-center text-xs text-red-400 min-h-[1.5rem]"></p>
            </form>
        </div>
    </div>

    <div id="main-app" class="app-screen z-30 flex flex-col hidden-screen">
        <div class="glass-panel border-b border-white/5 p-5 grid grid-cols-3 gap-2 sticky top-0 z-40">
            <div class="text-center cursor-pointer" onclick="openStore()">
                <p class="text-[8px] text-emerald-300 font-bold uppercase tracking-widest mb-0.5">👛 WALLET</p>
                <h1 id="total-earned" class="text-sm font-black text-emerald-400">0.00</h1>
            </div>
            <div class="text-center border-x border-white/10">
                <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">TIME</p>
                <h1 id="time-display" class="text-base font-black">0/30m</h1>
            </div>
            <div class="text-center">
                <p class="text-[8px] text-blue-300 font-bold uppercase tracking-widest mb-0.5">LUM TAGS</p>
                <h1 id="lum-count" class="text-sm font-black text-blue-400">0 FOUND</h1>
            </div>
        </div>

        <div class="flex-grow flex flex-col justify-center px-5 pb-10">
            <div class="glass-panel rounded-[40px] p-7 text-center relative">
                <div id="scene-badge" class="mb-4 inline-block px-3 py-1 bg-amber-500/20 rounded-full border border-amber-500/30">
                    <span id="scene-display" class="text-[10px] font-black text-amber-500 tracking-widest uppercase">SCENE: STANDBY</span>
                </div>

                <h2 id="target-text" class="text-2xl font-bold mb-4 min-h-[90px] flex items-center justify-center text-white italic">"Ready for Analysis"</h2>
                <p id="target-zh" class="text-sm text-slate-400 mb-6 min-h-[20px]"></p>
                
                <div id="lum-diagnosis" class="min-h-[40px] mb-4 flex flex-wrap justify-center gap-2"></div>

                <div id="score-display" class="h-20 mb-6 flex flex-col items-center justify-center">
                    <p class="text-gray-500 text-[10px] font-bold tracking-widest">AWAITING INPUT</p>
                </div>

                <div class="flex items-center justify-center gap-8">
                    <button onclick="fetchNewPhrase()" class="w-12 h-12 glass-panel rounded-full flex items-center justify-center active:scale-75 transition-transform">🔄</button>
                    <button id="record-btn" onclick="toggleRecord()" class="w-24 h-24 rounded-full flex items-center justify-center shadow-lg transition-all" style="background: linear-gradient(145deg, #f59e0b, #b45309);">
                        <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 005.93 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z"></path></svg>
                    </button>
                    <button onclick="playAudio()" class="w-12 h-12 glass-panel rounded-full flex items-center justify-center active:scale-75">🔊</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 核心配置与初始化
        // ==========================================
        const supabaseUrl = 'https://tpawabhfakqpjmepruzx.supabase.co';
        const supabaseKey = 'sb_publishable_yTQwLVHf_OslklEhLsimLg_2jStPEJB';
        const oasisCloud = window.supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let currentPhrase = null;
        let appState = 'READY';
        let walletBalance = 0;
        let recognition = null;
        let capturedText = "";

        // ==========================================
        // LUM 差分对比算法：找出你到底读错了哪个词
        // ==========================================
        async function runLUMAnalysis(captured, target, phraseId) {
            const diagnosisBox = document.getElementById('lum-diagnosis');
            diagnosisBox.innerHTML = "";
            
            // 文本预处理：转小写，去标点
            const clean = (s) => s.toLowerCase().replace(/[^\w\s\d]/g, "").trim().split(/\s+/);
            const targetWords = clean(target);
            const capturedWords = clean(captured);
            
            // 找出目标句中存在但识别文本中缺失的单词（即错读/漏读）
            let missedWords = targetWords.filter(word => !capturedWords.includes(word));
            
            if (missedWords.length > 0) {
                const errorRecords = [];
                missedWords.forEach(word => {
                    // 1. UI 反馈
                    const tag = document.createElement('span');
                    tag.className = 'lum-tag';
                    tag.innerText = `Missed: ${word.toUpperCase()}`;
                    diagnosisBox.appendChild(tag);

                    // 2. 准备入库标签
                    let label = 'Pronunciation';
                    if (/\d+/.test(word)) label = 'Number_Accuracy';
                    if (word.length > 8) label = 'Complex_Word';

                    errorRecords.push({
                        user_id: currentUser.id,
                        phrase_id: phraseId,
                        wrong_word: word,
                        error_tag: label
                    });
                });

                // 3. 静默同步到 Supabase (user_errors 表)
                try {
                    await oasisCloud.from('user_errors').insert(errorRecords);
                    updateLumCountDisplay();
                } catch(e) { console.error("LUM Sync Error", e); }
            } else {
                diagnosisBox.innerHTML = "<span class='text-emerald-400 text-[10px] font-bold uppercase tracking-widest'>✨ Perfect Articulation (LUM Verified)</span>";
            }
        }

        async function updateLumCountDisplay() {
            const { count } = await oasisCloud.from('user_errors').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
            document.getElementById('lum-count').innerText = `${count || 0} TAGS`;
        }

        // ==========================================
        // 核心评估引擎：集成相似度打分与 LUM
        // ==========================================
        async function evaluateLogic() {
            const fb = document.getElementById('score-display');
            if (!capturedText || !currentPhrase) { setAppState('READY'); return; }

            const target = (document.getElementById('target-text').innerText).replace(/"/g, "");
            
            // 1. 基础评分 (Levenshtein 算法)
            const score = calculateSimilarity(capturedText, target);
            
            // 2. 运行 LUM 诊断
            await runLUMAnalysis(capturedText, target, currentPhrase.id);

            // 3. 结算奖励 (简化逻辑)
            let reward = 0;
            if (score >= 90) reward = currentPhrase.reward_aed;
            else if (score >= 60) reward = currentPhrase.reward_aed * 0.5;

            if (reward > 0) {
                walletBalance += reward;
                await oasisCloud.from('profiles').update({ wallet_balance: walletBalance }).eq('id', currentUser.id);
                document.getElementById('total-earned').innerText = walletBalance.toFixed(2);
            }

            const color = score >= 80 ? 'text-emerald-400' : 'text-amber-400';
            fb.innerHTML = `<span class="text-5xl font-black ${color}">${score}</span><br><span class="text-[10px] text-slate-500 uppercase">Heard: "${capturedText}"</span>`;
            
            setTimeout(() => setAppState('READY'), 2000);
        }

        // ==========================================
        // 鉴权与基础逻辑
        // ==========================================
        async function executeAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await oasisCloud.auth.signInWithPassword({ email, password });
            
            if (error) { document.getElementById('auth-msg').innerText = "❌ Login Failed"; return; }
            
            currentUser = data.user;
            const { data: profile } = await oasisCloud.from('profiles').select('*').eq('id', currentUser.id).single();
            walletBalance = profile.wallet_balance || 0;
            document.getElementById('total-earned').innerText = walletBalance.toFixed(2);
            
            document.getElementById('auth-screen').classList.add('hidden-screen');
            document.getElementById('main-app').classList.remove('hidden-screen');
            updateLumCountDisplay();
            fetchNewPhrase();
        }

        async function fetchNewPhrase() {
            const { data } = await oasisCloud.from('phrases').select('*').limit(100);
            currentPhrase = data[Math.floor(Math.random() * data.length)];
            document.getElementById('target-text').innerText = `"${currentPhrase.text_en}"`;
            document.getElementById('target-zh').innerText = currentPhrase.text_zh;
            document.getElementById('scene-display').innerText = "SCENE: " + currentPhrase.scenario;
            document.getElementById('lum-diagnosis').innerHTML = "";
            document.getElementById('score-display').innerHTML = "<p class='text-gray-500 text-[10px] font-bold tracking-widest'>SYSTEM READY</p>";
        }

        function toggleRecord() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Browser not supported");

            if (appState === 'LISTENING') {
                recognition.stop();
                setAppState('ANALYZING');
                return;
            }

            capturedText = "";
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.onresult = (e) => { capturedText = e.results[0][0].transcript; };
            recognition.onend = () => { if(appState === 'LISTENING') setAppState('ANALYZING'); };
            recognition.start();
            setAppState('LISTENING');
        }

        function setAppState(s) {
            appState = s;
            const btn = document.getElementById('record-btn');
            if (s === 'LISTENING') btn.classList.add('recording-active');
            else btn.classList.remove('recording-active');
            if (s === 'ANALYZING') evaluateLogic();
        }

        function calculateSimilarity(s1, s2) {
            const clean = (s) => s.toLowerCase().replace(/[^\w\s]/g, "");
            const a = clean(s1), b = clean(s2);
            if (a === b) return 100;
            const m = a.length, n = b.length;
            const d = Array.from({length: m+1}, () => new Uint32Array(n+1));
            for(let i=0; i<=m; i++) d[i][0] = i;
            for(let j=0; j<=n; j++) d[0][j] = j;
            for(let i=1; i<=m; i++) {
                for(let j=1; j<=n; j++) {
                    const cost = a[i-1] === b[j-1] ? 0 : 1;
                    d[i][j] = Math.min(d[i-1][j]+1, d[i][j-1]+1, d[i-1][j-1]+cost);
                }
            }
            return Math.round((1 - d[m][n] / Math.max(m, n)) * 100);
        }

        function playAudio() {
            if(!currentPhrase) return;
            const u = new SpeechSynthesisUtterance(currentPhrase.text_en);
            u.lang = 'en-US';
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
