<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Bridge - V6.10 登录装甲版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; font-family: -apple-system, sans-serif; }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #aa8000 100%); color: #000; transition: all 0.3s; }
        .gold-btn:active:not(:disabled) { transform: scale(0.95); opacity: 0.9; }
        .gold-btn:disabled { background: #4b5563; color: #9ca3af; cursor: not-allowed; }
        .glass-panel { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.1); }
        .recording-pulse { animation: pulse 1.5s infinite; background: #ef4444 !important; color: white !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        select { background-color: #1f2937; color: #fff; border: 1px solid #374151; border-radius: 0.5rem; padding: 0.5rem; outline: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="auth-panel" class="p-8 glass-panel rounded-2xl shadow-2xl w-full max-w-md mx-4 text-center">
        <h1 class="text-3xl font-bold text-[#d4af37] mb-2 text-center italic tracking-tighter">Oasis Bridge</h1>
        <p class="text-gray-500 mb-8 text-sm uppercase tracking-widest">Global Language Indorsement</p>
        <div class="space-y-4">
            <input id="email" type="email" placeholder="Email" class="w-full p-4 bg-gray-800 border border-gray-700 rounded-xl text-white outline-none focus:border-[#d4af37]">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 bg-gray-800 border border-gray-700 rounded-xl text-white outline-none focus:border-[#d4af37]">
            <button onclick="executeAuth()" class="w-full p-4 gold-btn rounded-xl font-bold">ENTER SYSTEM</button>
        </div>
        <p id="auth-msg" class="text-sm font-medium text-amber-500 mt-6 min-h-[1.25rem]"></p>
    </div>

    <div id="app-panel" class="hidden p-6 glass-panel rounded-2xl shadow-2xl w-full max-w-md mx-4 text-center">
        <div class="flex justify-between items-center mb-6">
            <div class="text-left">
                <p class="text-gray-500 text-[10px] uppercase tracking-widest font-bold">Cloud Wallet</p>
                <h2 class="text-2xl font-black text-[#d4af37]"><span id="balance">0.00</span> <span class="text-xs">AED</span></h2>
            </div>
            <select id="level-filter" onchange="fetchNewPhrase()">
                <option value="1">初级练习 L1</option>
                <option value="2">中级进阶 L2</option>
                <option value="3">专家模式 L3</option>
            </select>
        </div>
        
        <div class="bg-gray-800 rounded-xl p-5 mb-6 text-left border-t border-white/5">
            <div id="scenario-tag" class="bg-[#d4af37]/20 text-[#d4af37] text-[10px] px-2 py-0.5 rounded inline-block mb-3 uppercase font-bold tracking-widest">Negotiation</div>
            <h3 id="target-sentence" class="text-xl font-bold text-white mb-2 leading-tight tracking-tight">Fetching...</h3>
            <div id="target-zh" class="text-sm text-gray-500 mb-6 italic border-l-2 border-[#d4af37] pl-3"></div>
            
            <div id="feedback-box" class="min-h-[5rem] p-3 rounded bg-black/40 border border-white/5 text-sm flex items-center justify-center text-center flex-col transition-all">
                <span class="text-gray-500 font-bold uppercase tracking-widest">System Ready</span>
            </div>
        </div>

        <button id="mic-btn" onclick="toggleSpeechRecognition()" class="w-full p-5 gold-btn rounded-xl font-bold text-lg shadow-xl flex items-center justify-center gap-2 transition-all">
            <span id="mic-text">START RECORDING</span>
        </button>
    </div>

    <script>
        // ==========================================
        // 1. 算法与云端配置
        // ==========================================
        function calculateSimilarity(str1, str2) {
            const s1 = str1.toLowerCase().replace(/[^a-z0-9\s]/g, "").trim().replace(/\s+/g, " ");
            const s2 = str2.toLowerCase().replace(/[^a-z0-9\s]/g, "").trim().replace(/\s+/g, " ");
            if (s1 === s2) return 100;
            if (s1.length === 0 || s2.length === 0) return 0;
            const matrix = Array(s2.length + 1).fill(null).map(() => Array(s1.length + 1).fill(null));
            for (let i = 0; i <= s1.length; i++) matrix[0][i] = i;
            for (let j = 0; j <= s2.length; j++) matrix[j][0] = j;
            for (let j = 1; j <= s2.length; j++) {
                for (let i = 1; i <= s1.length; i++) {
                    const indicator = s1[i - 1] === s2[j - 1] ? 0 : 1;
                    matrix[j][i] = Math.min(matrix[j][i - 1] + 1, matrix[j - 1][i] + 1, matrix[j - 1][i - 1] + indicator);
                }
            }
            return Math.round((1 - matrix[s2.length][s1.length] / Math.max(s1.length, s2.length)) * 100);
        }

        let oasisCloud;
        function initSupabase() {
            if (window.supabase) {
                oasisCloud = window.supabase.createClient('https://tpawabhfakqpjmepruzx.supabase.co', 'sb_publishable_yTQwLVHf_OslklEhLsimLg_2jStPEJB');
            }
        }
        initSupabase();

        // ==========================================
        // 2. 装甲级登录校验 (核心修复区)
        // ==========================================
        async function executeAuth() {
            const msg = document.getElementById('auth-msg');
            msg.innerText = "⏳ VERIFYING...";

            // 防护 1：检查核心库是否加载
            if (!oasisCloud) {
                initSupabase();
                if (!oasisCloud) {
                    msg.innerText = "❌ 核心库未加载，请刷新网页或检查网络";
                    return;
                }
            }

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            // 防护 2：检查账号密码是否为空
            if (!email || !password) {
                msg.innerText = "⚠️ 请输入完整的邮箱和密码";
                return;
            }

            // 防护 3：网络请求捕获异常
            try {
                const { data, error } = await oasisCloud.auth.signInWithPassword({ email, password });
                if (error) {
                    msg.innerText = "❌ 登录失败: " + error.message;
                } else {
                    enterApp(data.user);
                }
            } catch (err) {
                msg.innerText = "❌ 网络连接异常，请重试";
            }
        }

        async function enterApp(user) {
            try {
                document.getElementById('auth-panel').classList.add('hidden');
                document.getElementById('app-panel').classList.remove('hidden');
                
                // 防护 4：防止因 profiles 表没配置导致崩溃
                const { data, error } = await oasisCloud.from('profiles').select('wallet_balance').eq('id', user.id).single();
                if (data && data.wallet_balance !== undefined) {
                    document.getElementById('balance').innerText = data.wallet_balance.toFixed(2);
                } else {
                    document.getElementById('balance').innerText = "0.00"; // 如果查不到余额，默认显示 0.00，绝不崩溃
                }
                
                fetchNewPhrase(); 
            } catch (err) {
                console.error("初始化应用数据失败:", err);
                fetchNewPhrase(); // 就算数据拉取失败，也要让用户能看到练习题
            }
        }

        let currentPhrase = null;
        async function fetchNewPhrase() {
            if (!oasisCloud) return;
            const level = parseInt(document.getElementById('level-filter').value); 
            const sentenceEl = document.getElementById('target-sentence');
            const zhEl = document.getElementById('target-zh');
            sentenceEl.innerText = "REFRESHING...";
            try {
                const { data, error } = await oasisCloud.from('phrases').select('*').eq('difficulty', level);
                if (data && data.length > 0) {
                    currentPhrase = data[Math.floor(Math.random() * data.length)];
                    sentenceEl.innerText = currentPhrase.text_en;
                    zhEl.innerText = currentPhrase.text_zh;
                    document.getElementById('scenario-tag').innerText = currentPhrase.scenario;
                    setAppState('READY'); 
                } else {
                    sentenceEl.innerText = "NO DATA";
                    zhEl.innerText = "当前难度无数据，请切换难度";
                    setAppState('READY');
                }
            } catch (err) { sentenceEl.innerText = "CONNECT ERROR"; }
        }

        // ==========================================
        // 3. FSM 状态机 (保持 V6.9 的完美顺滑)
        // ==========================================
        let appState = 'INIT'; 
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null; 
        let capturedText = "";

        function renderUI() {
            const fb = document.getElementById('feedback-box');
            const btn = document.getElementById('mic-btn');
            const text = document.getElementById('mic-text');

            switch(appState) {
                case 'READY':
                    fb.innerHTML = "<span class='text-gray-500 font-bold uppercase tracking-widest'>System Ready</span>";
                    btn.classList.remove('recording-pulse');
                    btn.disabled = false;
                    text.innerText = "START RECORDING";
                    break;
                case 'LISTENING':
                    fb.innerHTML = `<span class="text-amber-400 animate-pulse font-bold tracking-widest uppercase">🎙️ 聆听中, 请朗读...</span>`;
                    btn.classList.add('recording-pulse');
                    btn.disabled = false;
                    text.innerText = "STOP (STOP)";
                    break;
                case 'ANALYZING':
                    fb.innerHTML = `<span class="text-blue-400 animate-pulse font-bold tracking-widest uppercase">🔄 AI 正在分析您的发音...</span>`;
                    btn.classList.remove('recording-pulse');
                    btn.disabled = true;
                    text.innerText = "ANALYZING...";
                    break;
                case 'REWARDING':
                    btn.classList.remove('recording-pulse');
                    btn.disabled = true;
                    text.innerText = "SETTLING...";
                    break;
            }
        }

        function setAppState(newState) {
            if (appState === 'REWARDING' && newState !== 'READY') return;
            appState = newState;
            renderUI();
            if (newState === 'ANALYZING') {
                setTimeout(() => evaluateScore(), 600); 
            }
        }

        window.toggleSpeechRecognition = function() {
            if (!SpeechRecognition || appState === 'REWARDING' || !currentPhrase) return;

            if (appState === 'LISTENING') {
                try { recognition.stop(); } catch(e) {}
                setAppState('ANALYZING');
                return;
            }

            capturedText = ""; 
            setAppState('LISTENING');
            
            recognition = new SpeechRecognition(); 
            recognition.lang = 'en-US'; 
            recognition.continuous = false; 
            recognition.interimResults = false; 

            recognition.onresult = (event) => {
                capturedText = event.results[0][0].transcript;
            };

            recognition.onerror = (e) => {
                if (appState !== 'LISTENING') return;
                const fb = document.getElementById('feedback-box');
                fb.innerHTML = `<span class="text-red-400 font-bold uppercase text-[10px]">⚠️ Error: ${e.error}</span>`;
                setTimeout(() => setAppState('READY'), 2000);
            };

            recognition.onend = () => { 
                if (appState === 'LISTENING') {
                    if (capturedText !== "") {
                        setAppState('ANALYZING');
                    } else {
                        const fb = document.getElementById('feedback-box');
                        fb.innerHTML = `<span class="text-gray-500 font-bold uppercase text-[10px]">No Speech Detected</span>`;
                        setTimeout(() => setAppState('READY'), 1500);
                    }
                }
            };

            recognition.start();
        };

        function evaluateScore() {
            const fb = document.getElementById('feedback-box');
            if (!capturedText) {
                fb.innerHTML = `<span class="text-gray-500 font-bold uppercase text-[10px]">Empty Record</span>`;
                setTimeout(() => setAppState('READY'), 1500);
                return;
            }

            const score = calculateSimilarity(capturedText, currentPhrase.text_en);
            
            if (score >= 90) {
                fb.innerHTML = `<span class="text-4xl font-black text-green-400 mb-1">${score}</span><span class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter italic">识别内容: "${capturedText}"</span>`;
                triggerReward(); 
            } else {
                fb.innerHTML = `<span class="text-3xl font-black text-amber-500 mb-1">${score} 分</span><span class="text-[10px] text-gray-500 font-bold uppercase">听到内容: "${capturedText}"</span>`;
                setTimeout(() => setAppState('READY'), 2000); 
            }
        }

        async function triggerReward() {
            setAppState('REWARDING');
            try {
                const { data: { user } } = await oasisCloud.auth.getUser();
                const { data: profile } = await oasisCloud.from('profiles').select('wallet_balance').eq('id', user.id).single();
                const newBalance = (profile?.wallet_balance || 0) + Number(currentPhrase.reward_aed);
                await oasisCloud.from('profiles').update({ wallet_balance: newBalance }).eq('id', user.id);
                document.getElementById('balance').innerText = newBalance.toFixed(2);
                
                setTimeout(async () => {
                    await fetchNewPhrase(); 
                }, 1500);
            } catch (err) { 
                setAppState('READY'); 
            }
        }
    </script>
</body>
</html>
