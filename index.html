<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Bridge - V6.3 稳如磐石版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; font-family: -apple-system, sans-serif; }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #aa8000 100%); color: #000; transition: all 0.3s; }
        .gold-btn:active:not(:disabled) { transform: scale(0.95); opacity: 0.9; }
        .gold-btn:disabled { background: #4b5563; color: #9ca3af; cursor: not-allowed; }
        .glass-panel { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.1); }
        .recording-pulse { animation: pulse 1.5s infinite; background: #ef4444 !important; color: white !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        select { background-color: #1f2937; color: #fff; border: 1px solid #374151; border-radius: 0.5rem; padding: 0.5rem; outline: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="auth-panel" class="p-8 glass-panel rounded-2xl shadow-2xl w-full max-w-md mx-4 text-center">
        <h1 class="text-3xl font-bold text-[#d4af37] mb-2 text-center">Oasis Bridge</h1>
        <p class="text-gray-500 mb-8 text-sm">欢迎回来，请登录您的云端金库</p>
        <div class="space-y-4">
            <input id="email" type="email" placeholder="邮箱地址" class="w-full p-4 bg-gray-800 border border-gray-700 rounded-xl text-white">
            <input id="password" type="password" placeholder="密码" class="w-full p-4 bg-gray-800 border border-gray-700 rounded-xl text-white">
            <button onclick="executeAuth()" class="w-full p-4 gold-btn rounded-xl font-bold">登 录</button>
        </div>
        <p id="auth-msg" class="text-sm font-medium text-amber-500 mt-6 min-h-[1.25rem]"></p>
    </div>

    <div id="app-panel" class="hidden p-6 glass-panel rounded-2xl shadow-2xl w-full max-w-md mx-4 text-center">
        <div class="flex justify-between items-center mb-6">
            <div class="text-left">
                <p class="text-gray-500 text-xs uppercase tracking-widest">账户余额</p>
                <h2 class="text-2xl font-black text-[#d4af37]"><span id="balance">0.00</span> AED</h2>
            </div>
            <div class="flex flex-col gap-2">
                <select id="level-filter" onchange="fetchNewPhrase()">
                    <option value="1">初级练习</option>
                    <option value="2">中级进阶</option>
                    <option value="3">高级专家</option>
                </select>
                <button onclick="doSignOut()" class="text-gray-500 text-xs hover:text-[#d4af37] text-right">退出登录</button>
            </div>
        </div>
        
        <div class="bg-gray-800 rounded-xl p-5 mb-6 text-left border-l-4 border-[#d4af37]">
            <div id="scenario-tag" class="bg-[#d4af37]/20 text-[#d4af37] text-[10px] px-2 py-0.5 rounded inline-block mb-3 uppercase font-bold">LOADING...</div>
            <p class="text-gray-400 text-sm mb-1">请流利朗读：</p>
            <h3 id="target-sentence" class="text-xl font-bold text-white mb-2 leading-tight">加载中...</h3>
            <p id="target-zh" class="text-sm text-gray-500 mb-4 italic"></p>
            
            <div id="feedback-box" class="min-h-[4rem] p-3 rounded bg-gray-900 border border-gray-700 text-sm text-gray-400 flex items-center justify-center text-center flex-col">
                <span>准备就绪</span>
            </div>
        </div>

        <button id="mic-btn" onclick="toggleSpeechRecognition()" class="w-full p-5 gold-btn rounded-xl font-bold text-lg shadow-xl flex items-center justify-center gap-2">
            <span id="mic-text">点击开始录音</span>
        </button>
        <p class="text-[10px] text-gray-600 mt-4">已启用 Levenshtein 核心打分算法</p>
    </div>

    <script>
        // ==========================================
        // 0. 核心科技：真实文本相似度计算引擎
        // ==========================================
        function calculateSimilarity(str1, str2) {
            const s1 = str1.toLowerCase().replace(/[^a-z0-9\s]/g, "").trim().replace(/\s+/g, " ");
            const s2 = str2.toLowerCase().replace(/[^a-z0-9\s]/g, "").trim().replace(/\s+/g, " ");
            
            if (s1 === s2) return 100;
            if (s1.length === 0 || s2.length === 0) return 0;

            const matrix = Array(s2.length + 1).fill(null).map(() => Array(s1.length + 1).fill(null));
            for (let i = 0; i <= s1.length; i++) matrix[0][i] = i;
            for (let j = 0; j <= s2.length; j++) matrix[j][0] = j;

            for (let j = 1; j <= s2.length; j++) {
                for (let i = 1; i <= s1.length; i++) {
                    const indicator = s1[i - 1] === s2[j - 1] ? 0 : 1;
                    matrix[j][i] = Math.min(
                        matrix[j][i - 1] + 1, 
                        matrix[j - 1][i] + 1, 
                        matrix[j - 1][i - 1] + indicator 
                    );
                }
            }
            const distance = matrix[s2.length][s1.length];
            const maxLen = Math.max(s1.length, s2.length);
            return Math.round((1 - distance / maxLen) * 100);
        }

        // ==========================================
        // 1 & 2. 云端连接与登录 (已焊死您的真实秘钥)
        // ==========================================
        let oasisCloud;
        const msgBox = document.getElementById('auth-msg');
        function initSupabase() {
            if (window.supabase) {
                oasisCloud = window.supabase.createClient(
                    'https://tpawabhfakqpjmepruzx.supabase.co', 
                    'sb_publishable_yTQwLVHf_OslklEhLsimLg_2jStPEJB'
                );
            }
        }
        initSupabase();

        async function executeAuth() {
            msgBox.innerText = "⏳ 正在响应...";
            if (!oasisCloud) { 
                initSupabase(); 
                if(!oasisCloud) { msgBox.innerText = "❌ 网络核心库未加载，请刷新网页"; return; } 
            }
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) { msgBox.innerText = "⚠️ 请填写邮箱和密码"; return; }
            const { data, error } = await oasisCloud.auth.signInWithPassword({ email, password });
            if (error) msgBox.innerText = error.message; else enterApp(data.user);
        }

        async function enterApp(user) {
            document.getElementById('auth-panel').classList.add('hidden');
            document.getElementById('app-panel').classList.remove('hidden');
            const { data } = await oasisCloud.from('profiles').select('wallet_balance').eq('id', user.id).single();
            if (data) document.getElementById('balance').innerText = data.wallet_balance.toFixed(2);
            fetchNewPhrase(); 
        }

        function doSignOut() { location.reload(); }

        // ==========================================
        // 3. 提取 DC 动态数据 (带防呆机制)
        // ==========================================
        let currentPhrase = null;
        async function fetchNewPhrase() {
            if (!oasisCloud) return;
            const selectedLevel = document.getElementById('level-filter').value;
            const targetSentenceEl = document.getElementById('target-sentence');
            const targetZhEl = document.getElementById('target-zh');
            const scenarioTagEl = document.getElementById('scenario-tag');
            const feedbackBox = document.getElementById('feedback-box');
            const micBtn = document.getElementById('mic-btn');
            
            targetSentenceEl.innerText = "🔄 正在从云端抽取...";
            targetZhEl.innerText = "";
            
            try {
                const { data, error } = await oasisCloud.from('phrases').select('*').eq('difficulty', selectedLevel);
                if (error) throw error;
                
                if (data && data.length > 0) {
                    currentPhrase = data[Math.floor(Math.random() * data.length)];
                    targetSentenceEl.innerText = currentPhrase.text_en;
                    targetZhEl.innerText = "中文：" + currentPhrase.text_zh;
                    scenarioTagEl.innerText = currentPhrase.scenario;
                    feedbackBox.innerHTML = "<span class='text-gray-400'>准备就绪，请点击录音</span>";
                    micBtn.disabled = false;
                } else {
                    currentPhrase = null;
                    targetSentenceEl.innerText = "⚠️ 题库空空如也";
                    targetZhEl.innerText = "当前难度下暂无语料，请点击上方菜单切换难度！";
                    scenarioTagEl.innerText = "EMPTY";
                    feedbackBox.innerHTML = "<span class='text-red-400'>请先切换难度</span>";
                    micBtn.disabled = true;
                }
            } catch (err) {
                console.error("DC 读取错误:", err);
                targetSentenceEl.innerText = "❌ 语料库连接失败";
            }
        }

        // ==========================================
        // 4. 语音监听与真实打分反馈
        // ==========================================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null; let isRecording = false; let isProcessing = false; let isRewarding = false;
        let watchdog = null;

        function forceResetUI() {
            clearTimeout(watchdog); isRecording = false; isProcessing = false; isRewarding = false;
            const micBtn = document.getElementById('mic-btn');
            micBtn.classList.remove('recording-pulse');
            document.getElementById('mic-text').innerText = "点击开始录音";
            if(currentPhrase) micBtn.disabled = false;
        }

        window.toggleSpeechRecognition = function() {
            if (!SpeechRecognition || isRewarding || isProcessing || !currentPhrase) return;

            if (isRecording) {
                isProcessing = true;
                document.getElementById('mic-text').innerText = "🔄 正在分析...";
                document.getElementById('mic-btn').disabled = true;
                try { recognition.stop(); } catch(e) {}
                watchdog = setTimeout(forceResetUI, 4000);
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            isRecording = true;
            document.getElementById('mic-btn').classList.add('recording-pulse');
            document.getElementById('mic-text').innerText = "正在录音... (点击结束)";
            try { recognition.start(); } catch(e) { forceResetUI(); }

            recognition.onresult = (event) => {
                clearTimeout(watchdog);
                const spoken = event.results[0][0].transcript;
                const target = currentPhrase.text_en;

                const realScore = calculateSimilarity(spoken, target);
                const feedbackBox = document.getElementById('feedback-box');

                if (realScore >= 90) {
                    feedbackBox.innerHTML = `
                        <span class="text-3xl font-black text-green-400 mb-1">${realScore} 分</span>
                        <span class="text-xs text-gray-400">Excellent! 识别内容: "${spoken}"</span>
                    `;
                    triggerReward(); 
                } else if (realScore >= 60) {
                    feedbackBox.innerHTML = `
                        <span class="text-3xl font-black text-amber-400 mb-1">${realScore} 分</span>
                        <span class="text-xs text-gray-400">勉强及格！听到内容: "${spoken}"</span>
                    `;
                    forceResetUI();
                } else {
                    feedbackBox.innerHTML = `
                        <span class="text-3xl font-black text-red-400 mb-1">${realScore} 分</span>
                        <span class="text-xs text-gray-400">差异过大。听到内容: "${spoken}"</span>
                    `;
                    forceResetUI();
                }
            };
            
            recognition.onerror = forceResetUI;
            recognition.onend = () => { if(!isRewarding) forceResetUI(); };
        };

        async function triggerReward() {
            isRewarding = true;
            document.getElementById('mic-text').innerText = "正在结算奖励...";
            try {
                const { data: { user } } = await oasisCloud.auth.getUser();
                const { data: profile } = await oasisCloud.from('profiles').select('wallet_balance').eq('id', user.id).single();
                const newBalance = (profile?.wallet_balance || 0) + Number(currentPhrase.reward_aed);
                await oasisCloud.from('profiles').update({ wallet_balance: newBalance }).eq('id', user.id);
                document.getElementById('balance').innerText = newBalance.toFixed(2);
                await fetchNewPhrase(); 
            } finally {
                forceResetUI();
            }
        }
    </script>
</body>
</html>
