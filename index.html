<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oasis Bridge V9.0 - 磐石架构版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
        .app-screen { background: radial-gradient(circle at top right, #1f2937, #030712 80%); color: #f3f4f6; min-height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; overflow-y: auto; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); }
        .recording-active { animation: pulse-gold 1.2s infinite alternate; background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%) !important; }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); } 100% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } }
        .hidden-screen { display: none !important; }
        .lum-tag { background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.4); color: #60a5fa; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        button:disabled { opacity: 0.5 !important; cursor: not-allowed !important; filter: grayscale(100%); }
        input { background: rgba(0,0,0,0.2); color: white; border: 1px solid rgba(255,255,255,0.1); outline: none; }
    </style>
</head>
<body class="font-sans overflow-hidden bg-slate-900">

    <div id="auth-screen" class="app-screen z-[60] flex flex-col p-8 justify-center transition-all duration-500">
        <div class="mb-10 text-center">
            <h1 class="text-5xl font-black text-amber-500 italic">Oasis Bridge</h1>
            <p class="text-amber-500/70 mt-3 text-[10px] font-bold tracking-[0.4em]">ARCHITECTURE V9.0</p>
        </div>
        <div class="glass-panel p-8 rounded-[40px] max-w-md mx-auto w-full text-center">
            <form onsubmit="event.preventDefault(); executeAuth();" class="space-y-4">
                <input id="email" type="email" placeholder="Email" required class="w-full p-5 rounded-2xl">
                <input id="password" type="password" placeholder="Password" required class="w-full p-5 rounded-2xl">
                <button type="submit" id="auth-action-btn" class="w-full py-5 rounded-2xl bg-amber-600 text-white font-black">SYSTEM LOGIN</button>
                <p id="auth-msg" class="text-center text-xs text-red-400 min-h-[1.5rem] mt-2"></p>
            </form>
        </div>
    </div>

    <div id="step-1" class="app-screen z-50 flex flex-col p-8 justify-center hidden-screen text-center">
        <h2 class="text-2xl font-black mb-8">Select Your Path</h2>
        <div class="space-y-5">
            <button onclick="handleStep1('cn')" class="w-full glass-panel rounded-[32px] p-8 text-left"><h3 class="font-bold text-2xl">Learn Mandarin</h3><p class="text-xs text-amber-500 font-bold mt-1">For Digital Nomads</p></button>
            <button onclick="handleStep1('en')" class="w-full glass-panel rounded-[32px] p-8 text-left border-amber-500/30"><h3 class="font-bold text-2xl text-amber-400">我要学英语</h3><p class="text-xs text-slate-400 font-bold mt-1">中东职场实战包</p></button>
        </div>
    </div>

    <div id="step-time" class="app-screen z-45 flex flex-col p-8 justify-center hidden-screen text-center">
        <h2 class="text-2xl font-black mb-8">Set Daily Goal</h2>
        <div class="grid grid-cols-2 gap-5">
            <button onclick="handleStepTime(15)" class="glass-panel py-10 rounded-[32px] font-bold">15 Mins</button>
            <button onclick="handleStepTime(30)" class="glass-panel py-10 rounded-[32px] font-bold">30 Mins</button>
        </div>
    </div>

    <div id="step-2" class="app-screen z-40 flex flex-col p-8 justify-center hidden-screen text-center">
        <h2 class="text-2xl font-black mb-8">Difficulty Level</h2>
        <div class="space-y-5">
            <button onclick="handleStep2(1)" class="w-full glass-panel p-6 rounded-[32px] font-bold text-lg">L1 - Foundation</button>
            <button onclick="handleStep2(2)" class="w-full glass-panel p-6 rounded-[32px] font-bold text-lg">L2 - Professional</button>
            <button onclick="handleStep2(3)" class="w-full glass-panel p-6 rounded-[32px] font-bold text-lg border-amber-500/40 text-amber-400">L3 - Executive</button>
        </div>
    </div>

    <div id="main-app" class="app-screen z-30 flex flex-col hidden-screen">
        <div class="glass-panel border-b border-white/5 sticky top-0 p-5 grid grid-cols-3 gap-2 items-center">
            <div class="text-center cursor-pointer" onclick="openStore()">
                <p class="text-[8px] text-emerald-300">👛 WALLET</p><h1 id="total-earned" class="text-sm font-black text-emerald-400">0.00</h1>
            </div>
            <div class="text-center border-x border-white/10">
                <p class="text-[8px] text-slate-400">TIME</p><h1 id="time-display" class="text-sm font-black">0/30m</h1>
            </div>
            <div class="text-center">
                <p class="text-[8px] text-blue-300">LUM TAGS</p><h1 id="lum-count" class="text-sm font-black text-blue-400">0</h1>
            </div>
        </div>

        <div class="flex-grow flex flex-col justify-center px-5 pb-12 mt-4 text-center">
            <div class="glass-panel rounded-[40px] p-7 shadow-2xl relative border-t border-white/10">
                <div id="scene-badge" class="mb-4 inline-block px-3 py-1 bg-amber-500/10 rounded-full border border-amber-500/20"><span id="scene-display" class="text-[9px] font-black text-amber-500 uppercase">STANDBY</span></div>
                <h2 id="target-text" class="text-2xl font-bold mb-4 min-h-[90px] flex items-center justify-center text-white italic leading-tight">"Loading..."</h2>
                <p id="target-zh" class="text-sm text-slate-400 mb-6 min-h-[20px]"></p>
                
                <div id="lum-diagnosis" class="min-h-[30px] mb-4 flex flex-wrap justify-center gap-2"></div>
                <div id="score-display" class="h-24 mb-6 flex flex-col items-center justify-center"><p class="text-gray-500 text-[10px] font-bold">READY</p></div>
                
                <div class="flex items-center justify-between">
                    <button id="refresh-btn" onclick="fetchNewPhrase()" class="w-12 h-12 glass-panel rounded-full text-xl">🔄</button>
                    <button id="record-btn" onclick="toggleRecord()" class="w-24 h-24 rounded-full flex items-center justify-center shadow-xl transition-all" style="background: linear-gradient(145deg, #f59e0b, #b45309);">
                        <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 005.93 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z"></path></svg>
                    </button>
                    <button id="play-btn" onclick="playAudio()" class="w-12 h-12 glass-panel rounded-full text-xl">🔊</button>
                </div>
            </div>
        </div>
    </div>

    <div id="store-modal" class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-xl flex flex-col justify-end hidden-screen">
        <div class="glass-panel rounded-t-[40px] p-8 h-[80vh] overflow-y-auto">
            <h3 class="text-3xl font-black text-emerald-400 mb-6">Oasis Store</h3>
            <button onclick="closeModal('store-modal')" class="absolute top-8 right-8 text-white text-xl">✕</button>
            <div class="space-y-4">
                <div class="bg-gray-800/50 p-5 rounded-3xl border border-white/5">
                    <h4 class="text-lg font-bold text-white">LUM 画像系统</h4>
                    <button onclick="buyItem(50, 'LUM 权限')" class="w-full mt-4 py-3 bg-blue-600 rounded-xl text-white font-black">50 AED 兑换</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabase 配置
        const oasisCloud = window.supabase.createClient('https://tpawabhfakqpjmepruzx.supabase.co', 'sb_publishable_yTQwLVHf_OslklEhLsimLg_2jStPEJB');

        let currentUser = null; 
        let currentPhrase = null; 
        let walletBalance = 0; 
        let appState = 'READY'; 
        let recognition = null; 
        let capturedText = "";
        let watchdogTimer = null; // 防死锁看门狗
        let state = { path: 'en', targetTime: 30, currentTime: 0, dbLevel: 1 };

        // 核心数字标准化：中英双向映射兼容
        function normalize(s, lang) {
            if(!s) return "";
            let res = s.toLowerCase().replace(/[^\w\s\u4e00-\u9fa50-9]/g, "").trim();
            if(lang === 'cn') {
                const map = {'一':'1','二':'2','三':'3','四':'4','五':'5','六':'6','七':'7','八':'8','九':'9','十':'10'};
                for(let k in map) res = res.replace(new RegExp(k, 'g'), map[k]);
            }
            return res;
        }

        async function executeAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await oasisCloud.auth.signInWithPassword({ email, password });
            
            if (error) { 
                // 如果登录失败，尝试注册
                const regRes = await oasisCloud.auth.signUp({ email, password });
                if (regRes.error) return document.getElementById('auth-msg').innerText = "❌ " + regRes.error.message;
                currentUser = regRes.data.user;
            } else {
                currentUser = data.user;
            }

            const { data: prof } = await oasisCloud.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
            if (!prof) await oasisCloud.from('profiles').insert({ id: currentUser.id, wallet_balance: 0 });
            walletBalance = prof?.wallet_balance || 0;
            document.getElementById('total-earned').innerText = walletBalance.toFixed(2);
            document.getElementById('auth-screen').classList.add('hidden-screen');
            document.getElementById('step-1').classList.remove('hidden-screen');
        }

        function handleStep1(p) { state.path = p; document.getElementById('step-1').classList.add('hidden-screen'); document.getElementById('step-time').classList.remove('hidden-screen'); }
        function handleStepTime(t) { state.targetTime = t; document.getElementById('step-time').classList.add('hidden-screen'); document.getElementById('step-2').classList.remove('hidden-screen'); }
        function handleStep2(l) { state.dbLevel = l; document.getElementById('step-2').classList.add('hidden-screen'); document.getElementById('main-app').classList.remove('hidden-screen'); startApp(); }

        function startApp() {
            updateLumDisplay();
            setInterval(() => { if(state.currentTime < state.targetTime) { state.currentTime += (1/60); document.getElementById('time-display').innerText = `${Math.floor(state.currentTime)}/${state.targetTime}m`; } }, 1000);
            fetchNewPhrase();
        }

        // 统一行列架构的取词逻辑
        async function fetchNewPhrase() {
            setAppState('READY');
            const { data } = await oasisCloud.from('phrases').select('*').eq('difficulty', state.dbLevel);
            if(!data || data.length === 0) return document.getElementById('target-text').innerText = "No Data in DB";
            
            currentPhrase = data[Math.floor(Math.random() * data.length)];
            
            // 英文路径考英文看中文，中文路径考中文看英文
            const mainText = state.path === 'en' ? currentPhrase.text_en : currentPhrase.text_zh;
            const subText = state.path === 'en' ? currentPhrase.text_zh : currentPhrase.text_en;
            
            document.getElementById('target-text').innerText = `"${mainText}"`;
            document.getElementById('target-zh').innerText = subText;
            document.getElementById('scene-display').innerText = "SCENE: " + currentPhrase.scenario;
            document.getElementById('lum-diagnosis').innerHTML = "";
            document.getElementById('score-display').innerHTML = "<p class='text-gray-500 text-[10px]'>READY</p>";
        }

        // ==========================================
        // V9.0 核心重构：防死锁录音引擎
        // ==========================================
        function toggleRecord() {
            // 严格保护：如果在处理中，直接拒绝新的点击
            if (appState === 'ANALYZING' || appState === 'REWARDING') return;

            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (appState === 'LISTENING') {
                if (recognition) {
                    try { recognition.stop(); } catch(e) {} // 用户主动停止
                }
                setAppState('ANALYZING');
                return;
            }

            // 【关键修复】每次开启新录音前，必须暴力清空旧实例
            if (recognition) {
                try { recognition.abort(); } catch(e) {} 
            }

            capturedText = "";
            recognition = new SpeechRec();
            recognition.lang = state.path === 'en' ? 'en-US' : 'zh-CN';
            recognition.continuous = false; // 避免移动端无限挂起
            recognition.interimResults = false;

            recognition.onresult = (e) => { 
                capturedText = e.results[0][0].transcript; 
            };
            
            recognition.onspeechend = () => {
                try { recognition.stop(); } catch(e) {}
            };

            recognition.onend = () => { 
                if (appState === 'LISTENING') {
                    if (capturedText) evaluate();
                    else setAppState('READY'); // 没听到声音，直接复位
                }
            };

            recognition.onerror = (e) => { 
                console.warn("Speech API Error:", e.error);
                setAppState('READY'); // 任何异常立刻释放按钮
            };

            try { 
                recognition.start(); 
                setAppState('LISTENING'); 
            } catch(e) { 
                console.error("Start Error:", e);
                setAppState('READY'); 
            }
        }

        async function evaluate() {
            setAppState('ANALYZING');
            
            // 【看门狗机制】防止 async 阻塞导致界面永久卡死
            clearTimeout(watchdogTimer);
            watchdogTimer = setTimeout(() => {
                if (appState === 'ANALYZING' || appState === 'REWARDING') {
                    console.error("Evaluation Watchdog Timeout - Force Reset");
                    setAppState('READY');
                    fetchNewPhrase();
                }
            }, 6000);

            try {
                const target = document.getElementById('target-text').innerText.replace(/"/g, "");
                const score = calculateSimilarity(capturedText, target);
                
                // LUM 诊断 (分离处理，防止中断主线)
                const a = normalize(target, state.path).split(/\s+/);
                const b = normalize(capturedText, state.path).split(/\s+/);
                const missed = a.filter(w => w && !b.includes(w));
                
                if(missed.length > 0) {
                    const tags = missed.map(w => {
                        const el = document.createElement('span'); el.className='lum-tag'; el.innerText=w.toUpperCase();
                        document.getElementById('lum-diagnosis').appendChild(el);
                        return { user_id: currentUser.id, phrase_id: currentPhrase.id, wrong_word: w, error_tag: 'Missed' };
                    });
                    // Fire and forget
                    oasisCloud.from('user_errors').insert(tags).then(() => updateLumDisplay()).catch(()=>{});
                }

                // 奖励结算
                let reward = score >= 90 ? currentPhrase.reward_aed : (score >= 60 ? currentPhrase.reward_aed * 0.5 : 0);
                if (reward > 0) {
                    walletBalance += reward;
                    await oasisCloud.from('profiles').update({ wallet_balance: walletBalance }).eq('id', currentUser.id);
                    document.getElementById('total-earned').innerText = walletBalance.toFixed(2);
                }
                
                document.getElementById('score-display').innerHTML = `<span class="text-5xl font-black ${score>=80?'text-emerald-400':'text-amber-400'}">${score}</span><br><p class="text-[10px] text-slate-500 mt-1">Heard: "${capturedText}"</p>`;
                
                setAppState('REWARDING');
                
                // 正常走完，清除看门狗，切下一题
                clearTimeout(watchdogTimer);
                setTimeout(() => { fetchNewPhrase(); }, 2000);

            } catch (error) {
                console.error("Eval execution failed:", error);
                clearTimeout(watchdogTimer);
                setAppState('READY');
            }
        }

        // 统一控制 UI 组件的可用状态
        function setAppState(s) {
            appState = s;
            const btn = document.getElementById('record-btn');
            const refreshBtn = document.getElementById('refresh-btn');
            
            if (s === 'LISTENING') {
                btn.classList.add('recording-active');
            } else {
                btn.classList.remove('recording-active');
            }
            
            // 锁定逻辑：如果正在分析或结算，禁用所有操作按钮
            if (s === 'ANALYZING' || s === 'REWARDING') {
                btn.disabled = true;
                refreshBtn.disabled = true;
            } else {
                btn.disabled = false;
                refreshBtn.disabled = false;
            }
        }

        function calculateSimilarity(s1, s2) {
            const a = normalize(s1, state.path), b = normalize(s2, state.path);
            if (a === b) return 100;
            const m = a.length, n = b.length, d = Array.from({length: m+1}, () => new Uint32Array(n+1));
            for(let i=0; i<=m; i++) d[i][0] = i; for(let j=0; j<=n; j++) d[0][j] = j;
            for(let i=1; i<=m; i++) for(let j=1; j<=n; j++) d[i][j] = Math.min(d[i-1][j]+1, d[i][j-1]+1, d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
            return Math.round((1 - d[m][n] / Math.max(m, n)) * 100);
        }

        function playAudio() { 
            const u = new SpeechSynthesisUtterance(document.getElementById('target-text').innerText);
            u.lang = state.path === 'en' ? 'en-US' : 'zh-CN';
            window.speechSynthesis.speak(u); 
        }

        async function updateLumDisplay() {
            try {
                const { count } = await oasisCloud.from('user_errors').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
                document.getElementById('lum-count').innerText = count || 0;
            } catch(e) {}
        }
        
        function openStore() { document.getElementById('store-modal').classList.toggle('hidden-screen'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden-screen'); }
        async function buyItem(p, n) { 
            if (walletBalance < p) return alert("余额不足"); 
            walletBalance -= p; await oasisCloud.from('profiles').update({ wallet_balance: walletBalance }).eq('id', currentUser.id); 
            document.getElementById('total-earned').innerText = walletBalance.toFixed(2); alert("兑换成功: " + n); closeModal('store-modal'); 
        }
    </script>
</body>
</html>
