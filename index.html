<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Bridge - V5.6 拒绝装死版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; font-family: -apple-system, sans-serif; }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #aa8000 100%); color: #000; transition: all 0.3s; }
        .gold-btn:active:not(:disabled) { transform: scale(0.95); opacity: 0.9; }
        .gold-btn:disabled { background: #4b5563; color: #9ca3af; cursor: not-allowed; transform: none; }
        .glass-panel { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.1); }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .recording-pulse { animation: pulse 1.5s infinite; background: #ef4444 !important; color: white !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative">

    <div id="auth-panel" class="p-8 glass-panel rounded-2xl shadow-2xl w-full max-w-md mx-4 text-center">
        <h1 class="text-3xl font-bold text-[#d4af37] mb-2">Oasis Bridge</h1>
        <p id="auth-subtitle" class="text-gray-500 mb-8 text-sm">欢迎回来，请登录您的云端金库</p>
        
        <div class="space-y-4">
            <input id="email" type="email" placeholder="邮箱地址" class="w-full p-4 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none focus:border-[#d4af37]">
            <input id="password" type="password" placeholder="密码" class="w-full p-4 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none focus:border-[#d4af37]">
            <input id="confirm-password" type="password" placeholder="再次确认密码 (至少6位)" class="hidden w-full p-4 bg-gray-800 border border-gray-700 rounded-xl text-white focus:outline-none focus:border-[#d4af37]">
            
            <button id="main-auth-btn" onclick="executeAuth()" class="w-full p-4 gold-btn rounded-xl font-bold text-lg shadow-lg">登 录</button>
            <div class="pt-2">
                <button onclick="toggleAuthMode()" id="switch-mode-btn" class="text-sm text-[#d4af37] underline hover:text-white transition-colors">没有账号？点击开通金库</button>
            </div>
        </div>
        <p id="auth-msg" class="text-sm font-medium text-amber-500 mt-6 min-h-[1.25rem]"></p>
    </div>

    <div id="app-panel" class="hidden p-6 glass-panel rounded-2xl shadow-2xl w-full max-w-md mx-4 text-center">
        <div class="flex justify-between items-center mb-4">
            <p class="text-gray-400 text-sm">ID: <span id="user-display" class="text-white font-medium"></span></p>
            <button onclick="doSignOut()" class="text-gray-500 text-xs hover:text-[#d4af37]">退出登录</button>
        </div>

        <div class="mb-6 p-6 border border-[#d4af37]/20 rounded-2xl bg-black/50 relative overflow-hidden">
            <p class="text-gray-500 text-xs uppercase tracking-widest mb-1">云端实时账本</p>
            <h2 class="text-4xl font-black text-[#d4af37]"><span id="balance">0.00</span> <span class="text-lg">AED</span></h2>
        </div>
        
        <div class="bg-gray-800 rounded-xl p-5 mb-6 shadow-inner text-left">
            <span class="bg-gray-700 text-xs text-gray-300 px-2 py-1 rounded mb-3 inline-block">场景：迪拜商场购物</span>
            <p class="text-gray-400 text-sm mb-1">请流利读出以下英文：</p>
            <h3 id="target-sentence" class="text-2xl font-bold text-white mb-2">How much is this</h3>
            <p class="text-sm text-[#d4af37] mb-4">中文：这个多少钱？</p>
            
            <div id="feedback-box" class="min-h-[3rem] p-3 rounded bg-gray-900 border border-gray-700 text-sm text-gray-400 flex items-center justify-center text-center transition-all duration-300">
                等待您的发音...
            </div>
        </div>

        <button id="mic-btn" onclick="toggleSpeechRecognition()" class="w-full p-5 gold-btn rounded-xl font-bold text-lg shadow-xl flex items-center justify-center gap-2">
            <svg id="mic-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
            <span id="mic-text">点击开始录音</span>
        </button>
    </div>

    <script>
        // ==========================================
        // 1 & 2. 账号与云端逻辑 (彻底修复静默无反应 Bug)
        // ==========================================
        let oasisCloud;
        const msgBox = document.getElementById('auth-msg');
        
        // 提取初始化函数，方便随时重试
        function initSupabase() {
            try {
                if (window.supabase) {
                    oasisCloud = window.supabase.createClient('https://tpawabhfakqpjmepruzx.supabase.co', 'sb_publishable_yTQwLVHf_OslklEhLsimLg_2jStPEJB');
                    msgBox.innerText = "✅ 系统就绪";
                    return true;
                }
            } catch (e) { msgBox.innerText = "❌ 网络错误：" + e.message; }
            return false;
        }
        
        // 页面打开时尝试初始化
        initSupabase();

        const authPanel = document.getElementById('auth-panel'); const appPanel = document.getElementById('app-panel');
        const balanceEl = document.getElementById('balance'); const userDisplay = document.getElementById('user-display');
        const confirmPwdInput = document.getElementById('confirm-password'); const mainAuthBtn = document.getElementById('main-auth-btn');
        const switchModeBtn = document.getElementById('switch-mode-btn'); const authSubtitle = document.getElementById('auth-subtitle');
        const pwdInput = document.getElementById('password');

        let isLoginMode = true; 
        window.toggleAuthMode = function() {
            isLoginMode = !isLoginMode; msgBox.innerText = ""; 
            if (isLoginMode) {
                confirmPwdInput.classList.add('hidden'); confirmPwdInput.classList.remove('fade-in');
                mainAuthBtn.innerText = "登 录"; switchModeBtn.innerText = "没有账号？点击开通金库";
                authSubtitle.innerText = "欢迎回来，请登录您的云端金库"; pwdInput.placeholder = "密码";
            } else {
                confirmPwdInput.classList.remove('hidden'); confirmPwdInput.classList.add('fade-in'); 
                mainAuthBtn.innerText = "注 册 新 账 号"; switchModeBtn.innerText = "已有账号？直接登录";
                authSubtitle.innerText = "只需两步，创建您的专属账本"; pwdInput.placeholder = "设置密码 (至少6位)";
            }
        };

        window.executeAuth = async function() {
            // 修复1：只要点击，立刻给反馈，绝不装死
            msgBox.innerText = "⏳ 正在响应...";
            
            // 修复2：如果云端库断线，尝试抢救一次
            if (!oasisCloud) {
                const isRecovered = initSupabase();
                if (!isRecovered) {
                    msgBox.innerHTML = "<span class='text-red-500'>❌ 网络较慢，云端核心库未加载，请尝试刷新网页！</span>";
                    return;
                }
            }

            if (isLoginMode) await doSignIn(); else await doSignUp();
        };

        async function doSignUp() {
            const email = document.getElementById('email').value; const pwd1 = pwdInput.value; const pwd2 = confirmPwdInput.value;
            // 修复3：文案提示更醒目
            if (!email || !pwd1 || !pwd2) { msgBox.innerText = "⚠️ 请完整填写邮箱和密码！"; return; }
            if (pwd1 !== pwd2) { msgBox.innerText = "❌ 两次输入的密码不一致！"; return; }
            
            msgBox.innerText = "⏳ 正在开通...";
            const { error } = await oasisCloud.auth.signUp({ email, password: pwd1 });
            if (error) msgBox.innerText = "❌ 注册失败: " + error.message; 
            else { msgBox.innerText = "✅ 注册成功！请直接点击登录。"; pwdInput.value = ''; confirmPwdInput.value = ''; setTimeout(toggleAuthMode, 1500); }
        }

        async function doSignIn() {
            const email = document.getElementById('email').value; const password = pwdInput.value;
            if(!email || !password) { msgBox.innerText = "⚠️ 请输入您的邮箱和密码！"; return; }
            
            msgBox.innerText = "⏳ 身份验证中...";
            const { data, error } = await oasisCloud.auth.signInWithPassword({ email, password });
            if (error) msgBox.innerText = "❌ 登录失败: " + error.message; else enterApp(data.user);
        }

        async function enterApp(user) {
            authPanel.classList.add('hidden'); appPanel.classList.remove('hidden');
            userDisplay.innerText = user.email.split('@')[0];
            const { data } = await oasisCloud.from('profiles').select('wallet_balance').eq('id', user.id).single();
            if (data) balanceEl.innerText = data.wallet_balance.toFixed(2);
        }

        window.doSignOut = async function() {
            await oasisCloud.auth.signOut();
            appPanel.classList.add('hidden'); authPanel.classList.remove('hidden'); msgBox.innerText = "✅ 已安全登出";
            document.getElementById('email').value = ''; pwdInput.value = ''; confirmPwdInput.value = ''; if(!isLoginMode) toggleAuthMode();
        };

        // ==========================================
        // 3. 核心引擎：V5.5 架构 (保持究极看门狗)
        // ==========================================
        const targetSentence = "How much is this"; 
        const micBtn = document.getElementById('mic-btn'); const micText = document.getElementById('mic-text'); const feedbackBox = document.getElementById('feedback-box');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null; 
        
        let isRecording = false;  let isProcessing = false; let isRewarding = false;  let hasResult = false;    
        let watchdogTimer = null;

        function setWatchdog(ms, warningMsg) {
            clearTimeout(watchdogTimer);
            watchdogTimer = setTimeout(() => {
                if (warningMsg) feedbackBox.innerHTML = `<span class='text-amber-400'>${warningMsg}</span>`;
                forceResetUI(); 
            }, ms);
        }

        function forceResetUI() {
            clearTimeout(watchdogTimer);
            isRecording = false; isProcessing = false; isRewarding = false;
            micBtn.classList.remove('recording-pulse'); micText.innerText = "点击开始录音"; micBtn.disabled = false;
        }

        window.toggleSpeechRecognition = function() {
            if (!SpeechRecognition) return feedbackBox.innerHTML = "<span class='text-red-400'>❌ 不支持语音识别，请使用 Chrome 或 Safari。</span>";
            if (isRewarding) return;

            if (isRecording) {
                isProcessing = true; micBtn.classList.remove('recording-pulse'); micText.innerText = "🔄 正在分析发音..."; micBtn.disabled = true; 
                try { recognition.stop(); } catch(e) {}
                setWatchdog(3000, "⚠️ 引擎无响应，已自动恢复，请重试。");
                return; 
            }

            if (recognition) { try { recognition.abort(); } catch(e) {} }

            recognition = new SpeechRecognition();
            recognition.lang = 'en-US'; recognition.interimResults = false; recognition.maxAlternatives = 1;
            isRecording = true; isProcessing = false; hasResult = false;

            micBtn.classList.add('recording-pulse'); micText.innerText = "正在录音... (点击结束)";
            feedbackBox.innerHTML = "<span class='text-white'>请朗读上方英文，读完再点一次按钮...</span>";

            setWatchdog(8000, "⚠️ 录音超时，已自动结束。");
            try { recognition.start(); } catch(e) { forceResetUI(); }

            recognition.onresult = function(event) {
                clearTimeout(watchdogTimer); hasResult = true; 
                const spokenText = event.results[0][0].transcript;
                const cleanSpoken = spokenText.toLowerCase().replace(/[.,!?]/g, "").trim();
                const cleanTarget = targetSentence.toLowerCase().replace(/[.,!?]/g, "").trim();

                if (cleanSpoken.includes(cleanTarget) || cleanTarget === cleanSpoken) {
                    feedbackBox.innerHTML = `✅ <span class="text-green-400">Perfect! 识别结果: "${spokenText}"</span>`; triggerReward(); 
                } else {
                    feedbackBox.innerHTML = `❌ <span class="text-red-400">系统听到的是: "${spokenText}"，请重试。</span>`; forceResetUI();
                }
            };

            recognition.onerror = function(event) {
                clearTimeout(watchdogTimer); hasResult = true; 
                if (event.error === 'aborted') {} 
                else if (event.error === 'not-allowed') { feedbackBox.innerHTML = "<span class='text-amber-400'>⚠️ 请允许麦克风权限</span>"; } 
                else if (event.error === 'no-speech') { feedbackBox.innerHTML = "<span class='text-gray-400'>未检测到声音，请大声一点。</span>"; } 
                else { feedbackBox.innerHTML = `<span class='text-red-400'>⚠️ 引擎网络抖动，请重试</span>`; }
                forceResetUI();
            };

            recognition.onend = function() {
                clearTimeout(watchdogTimer);
                if (!hasResult && isRecording) { feedbackBox.innerHTML = "<span class='text-gray-400'>未检测到有效发音，请重试。</span>"; }
                if (!isRewarding) forceResetUI();
            };
        };

        // ==========================================
        // 4. 商业闭环：结算必须加 Try-Finally 保底
        // ==========================================
        async function triggerReward() {
            if (!oasisCloud) return forceResetUI();
            
            isRewarding = true; micText.innerText = "正在向云端结算..."; micBtn.disabled = true;

            try {
                const { data: { user } } = await oasisCloud.auth.getUser();
                if (!user) throw new Error("用户未登录");

                const { data: profile, error: selectErr } = await oasisCloud.from('profiles').select('wallet_balance').eq('id', user.id).single();
                if (selectErr) throw selectErr;

                const updatedBalance = (profile?.wallet_balance || 0) + 0.35;
                const { error: updateErr } = await oasisCloud.from('profiles').update({ wallet_balance: updatedBalance }).eq('id', user.id);
                if (updateErr) throw updateErr;
                
                balanceEl.innerText = updatedBalance.toFixed(2);
                balanceEl.classList.add('fade-in'); setTimeout(() => balanceEl.classList.remove('fade-in'), 300);
                
            } catch (error) {
                console.error("云端结算失败:", error);
                feedbackBox.innerHTML = `<span class='text-red-400'>❌ 网络抖动，同步账本失败。</span>`;
            } finally {
                forceResetUI();
            }
        }
    </script>
</body>
</html>
