<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oasis Bridge V7.3 - 动态注册与防撞版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
        .app-screen { background: radial-gradient(circle at top right, #1f2937, #030712 80%); color: #f3f4f6; min-height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; overflow-y: auto; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); }
        .glass-btn { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .text-gold-gradient { background: linear-gradient(to right, #fbbf24, #d97706); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .recording-active { animation: pulse-gold 1.2s infinite alternate; background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%) !important; border-color: rgba(239, 68, 68, 0.5) !important; }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6), 0 0 20px rgba(239, 68, 68, 0.4); } 100% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0), 0 0 40px rgba(239, 68, 68, 0.2); } }
        .money-jump { animation: jump 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); color: #10b981 !important; text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        @keyframes jump { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .hidden-screen { display: none !important; }
        .modal-overlay { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); }
        .ad-btn-bg { background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input { background: rgba(0,0,0,0.3); color: white; outline: none; border: 1px solid rgba(255,255,255,0.1); }
        input:focus { border-color: #fbbf24; }
    </style>
</head>
<body class="font-sans overflow-hidden bg-slate-900">

    <div id="auth-screen" class="app-screen z-[60] flex flex-col p-8 justify-center transition-all duration-500">
        <div class="mb-10 text-center">
            <h1 class="text-5xl font-black text-gold-gradient tracking-tighter italic drop-shadow-lg">Oasis Bridge</h1>
            <p class="text-amber-500/70 mt-3 text-[10px] font-bold tracking-[0.4em] uppercase">Cloud Terminal V7.3</p>
        </div>
        
        <div class="glass-panel p-8 rounded-[40px] shadow-2xl border-white/10 relative overflow-hidden max-w-md mx-auto w-full">
            <h2 id="auth-title" class="text-2xl font-black text-white mb-6 tracking-tight text-center">System Login</h2>
            
            <div class="space-y-4 relative z-10">
                <input id="email" type="email" placeholder="Email Address" class="w-full p-5 rounded-2xl text-sm font-bold tracking-wider placeholder-gray-500 transition-colors">
                <input id="password" type="password" placeholder="Password" class="w-full p-5 rounded-2xl text-sm font-bold tracking-wider placeholder-gray-500 transition-colors">
                
                <div id="confirm-password-container" class="overflow-hidden transition-all duration-500 max-h-0 opacity-0">
                    <input id="confirm-password" type="password" placeholder="Confirm Password" class="w-full p-5 rounded-2xl text-sm font-bold tracking-wider placeholder-gray-500 transition-colors">
                </div>

                <button id="auth-action-btn" onclick="executeAuth()" class="w-full mt-2 py-5 rounded-2xl bg-gradient-to-r from-amber-500 to-amber-700 text-white font-black tracking-widest active:scale-95 transition-all shadow-[0_10px_20px_rgba(245,158,11,0.2)]">
                    SECURE LOGIN
                </button>
                <p id="auth-msg" class="text-center text-xs font-bold text-red-400 min-h-[1.5rem] mt-2"></p>
            </div>

            <div class="mt-4 text-center border-t border-white/5 pt-5 relative z-10">
                <p class="text-xs text-gray-500 font-bold tracking-widest uppercase">
                    <span id="auth-switch-text">New to Oasis?</span> 
                    <button onclick="toggleAuthMode()" id="auth-switch-btn" class="text-amber-400 hover:text-amber-300 transition-colors ml-2 font-black underline underline-offset-4">Create Account</button>
                </p>
            </div>
        </div>
    </div>

    <div id="step-1" class="app-screen z-50 flex flex-col p-8 justify-center hidden-screen">
        <div class="mb-14 text-center">
            <h1 class="text-5xl font-black text-gold-gradient tracking-tighter italic drop-shadow-lg">Oasis Bridge</h1>
            <p class="text-amber-500/70 mt-3 text-[10px] font-bold tracking-[0.4em] uppercase">Select
